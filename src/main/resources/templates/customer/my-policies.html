<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Policies - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #4e73df, #224abe); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-shield-check"></i> InsureFlow — Customer</span>
        <div>
            <a href="/customer/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">My Purchased Policies</h3>
        <div class="table-responsive">
            <table class="table table-bordered bg-white align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Policy Number</th><th>Plan</th><th>Purchase Date</th><th>Status</th><th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${purchasesPage.content}">
                        <td th:text="${p.policyNumber}"></td>
                        <td th:text="${p.policyPlan.name}"></td>
                        <td th:text="${p.purchaseDate}"></td>
                        <td><span class="badge bg-success" th:text="${p.status}"></span></td>
                        <td>
                            <a th:href="@{/customer/claims/file/{id}(id=${p.id})}" class="btn btn-danger btn-sm">File a Claim</a>
                        </td>
                    </tr>
                    <tr th:if="${purchasesPage.content.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No policies purchased yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${purchasesPage.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:each="i : ${#numbers.sequence(0, purchasesPage.totalPages - 1)}"
                    th:classappend="${i == purchasesPage.number} ? 'active'">
                    <a class="page-link" th:href="@{/customer/my-policies(page=${i})}" th:text="${i + 1}"></a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
