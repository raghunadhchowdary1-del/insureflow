<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>File a Claim - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #4e73df, #224abe); }
        .card-form { border: none; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold">InsureFlow — Customer</span>
        <a href="/customer/my-policies" class="btn btn-outline-light btn-sm">Back</a>
    </nav>

    <div class="container mt-5 d-flex justify-content-center">
        <div class="card card-form p-4" style="width: 500px;">
            <h4 class="mb-1">File a Claim</h4>
            <p class="text-muted">Policy: <strong th:text="${purchase.policyNumber}"></strong> — <span th:text="${purchase.policyPlan.name}"></span></p>

            <form th:action="@{/customer/claims/file/{id}(id=${purchase.id})}" th:object="${claimRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Claim Amount (₹)</label>
                    <input type="number" step="0.01" th:field="*{claimAmount}" class="form-control">
                    <span class="text-danger small" th:if="${#fields.hasErrors('claimAmount')}" th:errors="*{claimAmount}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Reason for Claim</label>
                    <textarea th:field="*{reason}" class="form-control" rows="3"></textarea>
                    <span class="text-danger small" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></span>
                </div>
                <button type="submit" class="btn btn-danger w-100">Submit Claim</button>
            </form>
        </div>
    </div>
</body>
</html>
