<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            min-height: 100vh;
        }
        .checkout-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">
    <div class="card checkout-card p-5 text-center" style="width: 450px;">
        <h4 class="mb-3">Complete Your Payment</h4>
        <p class="text-muted">Policy: <strong th:text="${purchase.policyNumber}"></strong></p>
        <p class="text-muted mb-4">Plan: <strong th:text="${purchase.policyPlan.name}"></strong></p>
        <p id="statusText" class="text-muted">Redirecting to secure payment...</p>
    </div>

    <script th:inline="javascript">
        const options = {
            key: /*[[${razorpayKeyId}]]*/ '',
            amount: /*[[${amount}]]*/ 0,
            currency: "INR",
            name: "InsureFlow",
            description: /*[[${purchase.policyPlan.name}]]*/ '',
            order_id: /*[[${orderId}]]*/ '',
            prefill: {
                name: /*[[${customerName}]]*/ '',
                email: /*[[${customerEmail}]]*/ ''
            },
            theme: { color: "#224abe" },
            handler: function (response) {
                document.getElementById('statusText').innerText = "Verifying payment...";

                fetch('/customer/payment/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        razorpayOrderId: response.razorpay_order_id,
                        razorpayPaymentId: response.razorpay_payment_id,
                        razorpaySignature: response.razorpay_signature
                    })
                })
                .then(res => res.text())
                .then(result => {
                    if (result === "SUCCESS") {
                        window.location.href = "/customer/my-policies?paymentSuccess";
                    } else {
                        window.location.href = "/customer/policies?paymentFailed";
                    }
                });
            },
            modal: {
                ondismiss: function () {
                    window.location.href = "/customer/policies?paymentCancelled";
                }
            }
        };

        const rzp = new Razorpay(options);
        rzp.open();
    </script>
</body>
</html>
