<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Policies - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #4e73df, #224abe); }
        .card-plan { border: none; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-shield-check"></i> InsureFlow — Customer</span>
        <div>
            <a href="/customer/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">Available Policy Plans</h3>
        <div class="row g-4">
            <div class="col-md-4" th:each="plan : ${plans}">
                <div class="card card-plan p-3">
                    <h5 th:text="${plan.name}"></h5>
                    <span class="badge bg-primary mb-2" th:text="${plan.type}"></span>
                    <p class="text-muted small" th:text="${plan.description}"></p>
                    <p><strong>Premium:</strong> ₹<span th:text="${plan.premiumAmount}"></span></p>
                    <p><strong>Coverage:</strong> ₹<span th:text="${plan.coverageAmount}"></span></p>
                    <form th:action="@{/customer/policies/buy/{id}(id=${plan.id})}" method="post">
                        <button class="btn btn-primary w-100">Buy This Plan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
