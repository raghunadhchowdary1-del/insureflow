<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #4e73df, #224abe); }
        .card-stat { border: none; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
        .card-stat:hover { transform: translateY(-4px); color: inherit; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-shield-check"></i> InsureFlow — Customer</span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
    <div class="container mt-5">
        <h3 class="fw-bold mb-1">Welcome back 👋</h3>
        <p class="text-muted mb-4">Here's an overview of your insurance activity.</p>

        <div class="row g-4">
            <div class="col-md-4">
                <a href="/customer/my-policies" class="card card-stat p-4 text-center">
                    <i class="bi bi-file-earmark-text fs-1 text-primary"></i>
                    <h5 class="mt-3">My Policies</h5>
                    <p class="text-muted small">View and manage purchased policies</p>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/customer/policies" class="card card-stat p-4 text-center">
                    <i class="bi bi-cart-plus fs-1 text-success"></i>
                    <h5 class="mt-3">Buy a Policy</h5>
                    <p class="text-muted small">Browse available insurance plans</p>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/customer/claims" class="card card-stat p-4 text-center">
                    <i class="bi bi-clipboard2-pulse fs-1 text-danger"></i>
                    <h5 class="mt-3">My Claims</h5>
                    <p class="text-muted small">Track your filed claims</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
