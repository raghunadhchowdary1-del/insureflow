<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment History - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #4e73df, #224abe); }
        .badge-created { background-color: #6c757d; }
        .badge-success { background-color: #1cc88a; }
        .badge-failed { background-color: #e74a3b; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-shield-check"></i> InsureFlow — Customer</span>
        <div>
            <a href="/customer/my-policies" class="btn btn-outline-light btn-sm me-2">My Policies</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">Payment History</h3>
        <div class="table-responsive">
            <table class="table table-bordered bg-white align-middle">
                <thead class="table-dark">
                    <tr><th>Order ID</th><th>Policy Number</th><th>Amount (₹)</th><th>Status</th><th>Date</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${paymentsPage.content}">
                        <td th:text="${p.razorpayOrderId}"></td>
                        <td th:text="${p.policyPurchase.policyNumber}"></td>
                        <td th:text="${p.amount}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${p.status.name() == 'SUCCESS'} ? 'badge-success' : (${p.status.name() == 'FAILED'} ? 'badge-failed' : 'badge-created')"
                                  th:text="${p.status}"></span>
                        </td>
                        <td th:text="${#temporals.format(p.createdAt, 'dd-MMM-yyyy HH:mm')}"></td>
                    </tr>
                    <tr th:if="${paymentsPage.content.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No payment records yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${paymentsPage.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:each="i : ${#numbers.sequence(0, paymentsPage.totalPages - 1)}"
                    th:classappend="${i == paymentsPage.number} ? 'active'">
                    <a class="page-link" th:href="@{/customer/payment/history(page=${i})}" th:text="${i + 1}"></a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
