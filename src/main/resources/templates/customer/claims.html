<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Claims - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #4e73df, #224abe); }
        .badge-pending { background-color: #f6c23e; }
        .badge-review { background-color: #36b9cc; }
        .badge-approved { background-color: #1cc88a; }
        .badge-rejected { background-color: #e74a3b; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold">InsureFlow — Customer</span>
        <a href="/customer/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">My Claims</h3>
        <div class="table-responsive">
            <table class="table table-bordered bg-white align-middle">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Policy Number</th><th>Amount (₹)</th><th>Reason</th><th>Filed Date</th><th>Status</th><th>Remarks</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${claims}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.policyPurchase.policyNumber}"></td>
                        <td th:text="${c.claimAmount}"></td>
                        <td th:text="${c.reason}"></td>
                        <td th:text="${c.filedDate}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${c.status.name() == 'PENDING'} ? 'badge-pending' : (${c.status.name() == 'UNDER_REVIEW'} ? 'badge-review' : (${c.status.name() == 'APPROVED'} ? 'badge-approved' : 'badge-rejected'))"
                                  th:text="${c.status}"></span>
                        </td>
                        <td th:text="${c.remarks}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
