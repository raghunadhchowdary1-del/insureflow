<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #e74a3b 0%, #a92418 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">
    <div class="card p-5 shadow text-center" style="width: 480px; border-radius: 16px; border:none;">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
        <h3 class="mt-3" th:text="${errorTitle}">Error</h3>
        <p class="text-muted" th:text="${errorMessage}">Something went wrong.</p>
        <a href="/" class="btn btn-danger mt-2">Go to Home</a>
    </div>
</body>
</html>
