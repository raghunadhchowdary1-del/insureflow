<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #2c2c2c, #111111); }
        .card-stat { border: none; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
        .card-stat:hover { transform: translateY(-4px); color: inherit; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-speedometer2"></i> InsureFlow — Admin</span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
    <div class="container mt-5">
        <h3 class="fw-bold mb-1">Admin Dashboard</h3>
        <p class="text-muted mb-4">Manage policy plans and oversee claims.</p>
        <div th:if="${param.expiryChecked}" class="alert alert-success">
    <i class="bi bi-check-circle"></i> Policy expiry check completed successfully.
</div>

<form th:action="@{/admin/run-expiry-check}" method="post" class="mb-4">
    <button class="btn btn-outline-dark btn-sm"><i class="bi bi-clock-history"></i> Run Policy Expiry Check Now (Demo)</button>
</form>
        <div class="row g-4">
            <div class="col-md-4">
                <a href="/admin/policies" class="card card-stat p-4 text-center">
                    <i class="bi bi-file-earmark-plus fs-1 text-primary"></i>
                    <h5 class="mt-3">Policy Plans</h5>
                    <p class="text-muted small">Create and manage insurance plans</p>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/admin/claims" class="card card-stat p-4 text-center">
                    <i class="bi bi-check2-circle fs-1 text-danger"></i>
                    <h5 class="mt-3">Approve Claims</h5>
                    <p class="text-muted small">Final claim approval authority</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
