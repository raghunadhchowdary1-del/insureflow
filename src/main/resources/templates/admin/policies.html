<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Policy Plans - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #2c2c2c, #111111); }
        .card-form { border: none; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-speedometer2"></i> InsureFlow — Admin</span>
        <div>
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">Manage Policy Plans</h3>

        <div class="card card-form p-4 mb-4">
            <h5 class="mb-3">Create New Plan</h5>
            <form th:action="@{/admin/policies}" th:object="${policyPlanRequest}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Plan Name</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <span class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Type</label>
                        <select th:field="*{type}" class="form-select">
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Premium Amount (₹)</label>
                        <input type="number" step="0.01" th:field="*{premiumAmount}" class="form-control">
                        <span class="text-danger small" th:if="${#fields.hasErrors('premiumAmount')}" th:errors="*{premiumAmount}"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Coverage Amount (₹)</label>
                        <input type="number" step="0.01" th:field="*{coverageAmount}" class="form-control">
                        <span class="text-danger small" th:if="${#fields.hasErrors('coverageAmount')}" th:errors="*{coverageAmount}"></span>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark mt-3"><i class="bi bi-plus-circle"></i> Create Plan</button>
            </form>
        </div>

        <h5 class="mb-3">Existing Plans</h5>
        <div class="table-responsive">
            <table class="table table-bordered bg-white">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Name</th><th>Type</th><th>Premium (₹)</th><th>Coverage (₹)</th><th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="plan : ${plans}">
                        <td th:text="${plan.id}"></td>
                        <td th:text="${plan.name}"></td>
                        <td th:text="${plan.type}"></td>
                        <td th:text="${plan.premiumAmount}"></td>
                        <td th:text="${plan.coverageAmount}"></td>
                        <td th:text="${plan.description}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
