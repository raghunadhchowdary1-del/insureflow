<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Claims - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #2c2c2c, #111111); }
        .badge-pending { background-color: #f6c23e; }
        .badge-review { background-color: #36b9cc; }
        .badge-approved { background-color: #1cc88a; }
        .badge-rejected { background-color: #e74a3b; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-speedometer2"></i> InsureFlow — Admin</span>
        <div>
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">All Claims</h3>

        <form th:action="@{/admin/claims}" method="get" class="row g-2 mb-4">
            <div class="col-md-4">
                <input type="text" name="customerName" th:value="${customerName}" class="form-control" placeholder="Search by customer name">
            </div>
            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="">All Statuses</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == selectedStatus}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-dark w-100"><i class="bi bi-search"></i> Filter</button>
            </div>
            <div class="col-md-2">
                <a href="/admin/claims" class="btn btn-outline-secondary w-100">Clear</a>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-bordered bg-white align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Policy Number</th><th>Customer</th><th>Amount (₹)</th><th>Reason</th><th>Status</th><th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="claim : ${claimsPage.content}">
                        <td th:text="${claim.id}"></td>
                        <td th:text="${claim.policyPurchase.policyNumber}"></td>
                        <td th:text="${claim.policyPurchase.user.name}"></td>
                        <td th:text="${claim.claimAmount}"></td>
                        <td th:text="${claim.reason}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${claim.status.name() == 'PENDING'} ? 'badge-pending' : (${claim.status.name() == 'UNDER_REVIEW'} ? 'badge-review' : (${claim.status.name() == 'APPROVED'} ? 'badge-approved' : 'badge-rejected'))"
                                  th:text="${claim.status}"></span>
                        </td>
                        <td>
                            <div th:if="${claim.status.name() == 'UNDER_REVIEW'}">
                                <form th:action="@{/admin/claims/approve/{id}(id=${claim.id})}" method="post" class="d-inline">
                                    <button class="btn btn-success btn-sm">Approve</button>
                                </form>
                                <form th:action="@{/admin/claims/reject/{id}(id=${claim.id})}" method="post" class="d-inline">
                                    <button class="btn btn-danger btn-sm">Reject</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${claimsPage.content.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-4">No claims found.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${claimsPage.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:each="i : ${#numbers.sequence(0, claimsPage.totalPages - 1)}"
                    th:classappend="${i == claimsPage.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/claims(page=${i}, status=${selectedStatus}, customerName=${customerName})}"
                       th:text="${i + 1}"></a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
