<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>InsureFlow - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1cc88a 0%, #13855c 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-card h3 {
            font-weight: 700;
            color: #13855c;
        }
        .btn-success {
            padding: 10px;
            font-weight: 600;
        }
        .brand-icon {
            font-size: 2.5rem;
            color: #13855c;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="card auth-card p-4" style="width: 420px;">
            <div class="text-center mb-3">
                <i class="bi bi-person-plus-fill brand-icon"></i>
                <h3 class="mt-2">Create an Account</h3>
                <p class="text-muted">Join InsureFlow as a customer</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Name</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Your full name">
                    <span class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com">
                    <span class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="At least 6 characters">
                    <span class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                </div>
                <button type="submit" class="btn btn-success w-100 mt-2">Register</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Already have an account? <a th:href="@{/login}" class="fw-semibold text-decoration-none">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
