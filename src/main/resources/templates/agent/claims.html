<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Review Claims - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #1cc88a, #13855c); }
        .badge-pending { background-color: #f6c23e; }
        .badge-review { background-color: #36b9cc; }
        .badge-approved { background-color: #1cc88a; }
        .badge-rejected { background-color: #e74a3b; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold">InsureFlow — Agent</span>
        <div>
            <a href="/agent/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="fw-bold mb-4">All Claims</h3>

        <form th:action="@{/agent/claims}" method="get" class="row g-2 mb-4">
            <div class="col-md-4">
                <select name="status" class="form-select">
                    <option value="">All Statuses</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == selectedStatus}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">Filter</button>
            </div>
            <div class="col-md-2">
                <a href="/agent/claims" class="btn btn-outline-secondary w-100">Clear</a>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-bordered bg-white align-middle">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Policy Number</th><th>Customer</th><th>Amount (₹)</th><th>Reason</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${claimsPage.content}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.policyPurchase.policyNumber}"></td>
                        <td th:text="${c.policyPurchase.user.name}"></td>
                        <td th:text="${c.claimAmount}"></td>
                        <td th:text="${c.reason}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${c.status.name() == 'PENDING'} ? 'badge-pending' : (${c.status.name() == 'UNDER_REVIEW'} ? 'badge-review' : (${c.status.name() == 'APPROVED'} ? 'badge-approved' : 'badge-rejected'))"
                                  th:text="${c.status}"></span>
                        </td>
                        <td>
                            <form th:if="${c.status.name() == 'PENDING'}" th:action="@{/agent/claims/review/{id}(id=${c.id})}" method="post">
                                <button class="btn btn-info btn-sm">Mark Under Review</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${claimsPage.content.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-4">No claims found.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${claimsPage.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:each="i : ${#numbers.sequence(0, claimsPage.totalPages - 1)}"
                    th:classappend="${i == claimsPage.number} ? 'active'">
                    <a class="page-link" th:href="@{/agent/claims(page=${i}, status=${selectedStatus})}" th:text="${i + 1}"></a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
