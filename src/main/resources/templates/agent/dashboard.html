<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agent Dashboard - InsureFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-custom { background: linear-gradient(90deg, #1cc88a, #13855c); }
        .card-stat { border: none; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-decoration: none; color: inherit; display: block; }
        .card-stat:hover { color: inherit; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 shadow-sm">
        <span class="navbar-brand fw-bold"><i class="bi bi-person-badge"></i> InsureFlow — Agent</span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
    <div class="container mt-5">
        <h3 class="fw-bold mb-1">Agent Dashboard</h3>
        <p class="text-muted mb-4">Review and manage customer claims.</p>

        <a href="/agent/claims" class="card card-stat p-4" style="max-width: 350px;">
            <i class="bi bi-clipboard2-check fs-1 text-success"></i>
            <h5 class="mt-3">Review Claims</h5>
            <p class="text-muted small">View all claims and mark them under review</p>
        </a>
    </div>
</body>
</html>
