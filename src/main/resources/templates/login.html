<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>InsureFlow - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-card h3 {
            font-weight: 700;
            color: #224abe;
        }
        .btn-primary {
            background-color: #224abe;
            border: none;
            padding: 10px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #1a3a99;
        }
        .brand-icon {
            font-size: 2.5rem;
            color: #224abe;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="card auth-card p-4" style="width: 420px;">
            <div class="text-center mb-3">
                <i class="bi bi-shield-check brand-icon"></i>
                <h3 class="mt-2">InsureFlow</h3>
                <p class="text-muted">Insurance Policy & Claims Management</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i> Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle"></i> You have been logged out.
            </div>
            <div th:if="${param.registered}" class="alert alert-success">
                <i class="bi bi-check-circle"></i> Registration successful. Please log in.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="username" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
            </form>

            <div class="text-center my-3">
                <span class="text-muted small">OR</span>
            </div>

            <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger w-100 mb-3">
                <i class="bi bi-google"></i> Sign in with Google
            </a>

            <p class="text-center mt-2 mb-0">
                Don't have an account? <a th:href="@{/register}" class="fw-semibold text-decoration-none">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
